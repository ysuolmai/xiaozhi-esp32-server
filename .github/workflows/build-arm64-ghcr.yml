name: Build ARM64 Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile-server
      - Dockerfile-server-base
      - Dockerfile-web
      - 'main/xiaozhi-server/**'
      - 'main/manager-api/**'
      - 'main/manager-web/**'
      - 'docs/docker/**'
      - .github/workflows/build-arm64-ghcr.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ysuolmai/xiaozhi-esp32-server
  PLATFORM: linux/arm64

jobs:
  build:
    name: Build and push ARM64 images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server-base
          push: true
          platforms: ${{ env.PLATFORM }}
          tags: ${{ env.IMAGE }}:server-base
          cache-from: type=gha,scope=server-base-arm64
          cache-to: type=gha,mode=max,scope=server-base-arm64

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-server
          push: true
          platforms: ${{ env.PLATFORM }}
          tags: ${{ env.IMAGE }}:server_latest
          build-args: |
            SERVER_BASE_IMAGE=${{ env.IMAGE }}:server-base
          cache-from: type=gha,scope=server-arm64
          cache-to: type=gha,mode=max,scope=server-arm64

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-web
          push: true
          platforms: ${{ env.PLATFORM }}
          tags: ${{ env.IMAGE }}:web_latest
          cache-from: type=gha,scope=web-arm64
          cache-to: type=gha,mode=max,scope=web-arm64
